{% extends 'base.html' %}
{% load static %}

{% block content %}
<main>
    <div class="container-fluid px-4" style="padding-top:20px;">

        <h2 class="text-white mb-3">User Profile</h2>

        <ol class="breadcrumb mb-4">
            <li class="breadcrumb-item active text-white">Profile</li>
        </ol>

        <!-- Card -->
        <div class="card shadow-lg border-0" style="background:#1e293b; border-radius:15px;">

            <!-- Header -->
            <div class="card-header text-white" style="background:#020617; border-bottom:1px solid #334155;">
                <i class="fas fa-user me-1"></i>
                {{ user.first_name }} {{ user.last_name }} Profile Details
            </div>

            <!-- Body -->
            <div class="card-body">

                <!-- Messages -->
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-warning alert-dismissible fade show">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <!-- Form -->
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <!-- Profile Image -->
                    <div class="mb-4 text-center">
                        <label class="text-white d-block mb-2">Profile Picture</label>
                        <img src="{{ user.profile_pic.url }}" width="100" height="100"
                             style="border-radius:50%; border:2px solid #38bdf8;">
                    </div>

                    <div class="mb-3">
                        <label class="text-white">Change Profile Pic</label>
                        <input type="file" class="form-control" name="profile_pic">
                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="text-white">First Name</label>
                            <input type="text" class="form-control" name="first_name" value="{{ user.first_name }}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="text-white">Last Name</label>
                            <input type="text" class="form-control" name="last_name" value="{{ user.last_name }}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="text-white">Email</label>
                            <input type="email" class="form-control" readonly value="{{ user.email }}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="text-white">Mobile Number</label>
                            <input type="text" class="form-control" readonly value="{{ nsuser.mobilenumber }}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="text-white">Username</label>
                            <input type="text" class="form-control" readonly value="{{ user.username }}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="text-white">Registration Date</label>
                            <input type="text" class="form-control" readonly value="{{ user.date_joined }}">
                        </div>

                    </div>

                    <!-- Button -->
                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary px-4">Update Profile</button>
                    </div>

                </form>

            </div>
        </div>

    </div>
</main>
{% endblock %}
