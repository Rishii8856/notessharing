{% extends 'base.html' %}
{% load static %}

{% block content %}
<main>
    <div class="container-fluid px-4" style="padding-top:20px;">

        <h2 class="text-white mb-3">Change Password</h2>

        <ol class="breadcrumb mb-4">
            <li class="breadcrumb-item active text-white">Settings</li>
        </ol>

        <!-- Card -->
        <div class="card shadow-lg border-0" style="background:#1e293b; border-radius:15px;">

            <!-- Header -->
            <div class="card-header text-white" style="background:#020617; border-bottom:1px solid #334155;">
                <i class="fas fa-lock me-1"></i>
                {{ user.first_name }} {{ user.last_name }} Change Password
            </div>

            <!-- Body -->
            <div class="card-body">

                <!-- Messages -->
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-warning alert-dismissible fade show">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <!-- Form -->
                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="text-white">Current Password</label>
                        <input type="password" class="form-control" name="cpwd" required>
                    </div>

                    <div class="mb-3">
                        <label class="text-white">New Password</label>
                        <input type="password" class="form-control" name="npwd" required>
                    </div>

                    <button type="submit" class="btn btn-primary px-4">Change Password</button>

                </form>

            </div>
        </div>

    </div>
</main>
{% endblock %}
