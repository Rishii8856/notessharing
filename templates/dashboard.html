{% extends 'base.html' %}
{% load static %}

{% block content %}

<!-- Custom CSS -->
<link rel="stylesheet" href="{% static 'css/dashboard-custom.css' %}">

<!-- Font Awesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<main>
    <div class="container-fluid px-4" style="padding-top:20px;">
        
        <h1 class="mt-4 text-white">Dashboard</h1>

        <ol class="breadcrumb mb-4">
            <li class="breadcrumb-item active text-white">Dashboard</li>
        </ol>

        <!-- Welcome Box -->
        <div style="background: #1e293b; padding: 12px 20px; border-radius: 10px; margin-bottom: 20px;">
            <h5 style="color: #38bdf8; margin: 0;">
                Welcome {{ user.first_name }} {{ user.last_name }} 👋
            </h5>
        </div>

        <div class="row">

            <!-- Card 1 -->
            <div class="col-xl-6 col-md-6">
                <div class="card bg-primary text-white mb-4 shadow-lg border-0">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h6>Total Notes</h6>
                            <h3>{{ uploadedsub_count }}</h3>
                        </div>
                        <i class="fas fa-book fa-2x"></i>
                    </div>

                    <div class="card-footer d-flex justify-content-between align-items-center bg-dark">
                        <a class="small text-white stretched-link" href="{% url 'manage_notes' %}">
                            View Details
                        </a>
                        <div class="small text-white">
                            <i class="fas fa-angle-right"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="col-xl-6 col-md-6">
                <div class="card bg-warning text-white mb-4 shadow-lg border-0">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h6>Total Files</h6>
                            <h3>{{ total_files }}</h3>
                        </div>
                        <i class="fas fa-file fa-2x"></i>
                    </div>

                    <div class="card-footer d-flex justify-content-between align-items-center bg-dark">
                        <a class="small text-white stretched-link" href="{% url 'manage_notes' %}">
                            View Details
                        </a>
                        <div class="small text-white">
                            <i class="fas fa-angle-right"></i>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>
</main>

{% endblock %}
